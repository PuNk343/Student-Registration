<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#74ebd5,#ACB6E5);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#fff;padding:30px;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,.2);width:320px;text-align:center;animation:pop .6s ease}
h2{margin-bottom:20px;color:#333}
input{width:90%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:10px;outline:none;transition:.3s}
input:focus{border-color:#6c63ff;box-shadow:0 0 8px rgba(108,99,255,.4);transform:scale(1.03)}
button{width:95%;padding:12px;background:#6c63ff;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:.3s}
button:hover{background:#574bdb;transform:scale(1.05)}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="box">
<h2>Student Registration</h2>
<form onsubmit="return validateForm()">
<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button type="submit">Submit</button>
</form>
</div>
<script>
function validateForm(){
let fname=document.getElementById("fname").value.trim();
let lname=document.getElementById("lname").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
if(fname===""||lname===""||email===""||password===""){alert("All fields are required!");return false;}
alert("Registered Successfully!");return false;
}
</script>
</body>
</html>
